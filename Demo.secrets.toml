# ==============================================================
# AG 快餐系統 - Streamlit 金鑰設定範本 (Demo Secrets)
#
# 使用方式：
# 1. 複製此檔案的全部內容。
# 2. 在專案根目錄下的 `.streamlit/` 資料夾（若沒有請自行建立）。
# 3. 在該資料夾內建立一個 `secrets.toml` 檔案，並貼上此內容。
# 4. 把下方的「中文標記」替換為您真實的密碼與 Google JSON 內容。
# ==============================================================

# 系統介面登入密碼 (可自行修改)
admin_password = "您的管理者密碼"       # 用於進入「🛡️ 管理者後台 (Admin View)」
worker_password = "您的工作人員密碼"    # 用於進入「📋 訂單處理 (Order Processing)」

# Google Sheets 資料庫連線
[connections.gsheets]
type = "gsheets"
# 請將這裡替換成您的 Google 試算表公開網址
spreadsheet = "https://docs.google.com/spreadsheets/d/您的試算表ID/edit"

# ==============================================================
# 🔑 如何取得 Google Service Account JSON 金鑰：
# 1. 前往 Google Cloud Console (https://console.cloud.google.com/)
# 2. 建立或選擇一個 GCP 專案 (Project)。
# 3. 前往左側選單的「API 和服務」>「啟用 API 和服務」，搜尋並啟用：
#    - 🟢 Google Sheets API
#    - 🟢 Google Drive API
# 4. 前往左側選單的「IAM 與管理」>「服務帳戶」，點擊「建立服務帳戶」。
# 5. 建立完成後，點進該服務帳戶，切換到「金鑰」標籤。
# 6. 點擊「新增金鑰」>「建立新的金鑰」> 選擇格式為【JSON】並下載。
# 7. (⚠️ 重要) 打開您的 Google 試算表，點右上角的「共用」，
#    將這份 JSON 內的 `client_email` 加為「編輯者」。
# ==============================================================

# ==============================================================
# 下方為您的 Google Service Account 內容
# 請打開您下載的 JSON 金鑰檔，將裡面的值對應填入下方。
# ⚠️ 注意：private_key 的格式必須保留 \n 換行符號！
# ==============================================================
type = "service_account"
project_id = "您的專案ID"
private_key_id = "您的 private_key_id"
private_key = "-----BEGIN PRIVATE KEY-----\n您的私鑰內容請貼在這裡並確保保留\\n符號\n-----END PRIVATE KEY-----\n"
client_email = "您的服務帳戶_email@_iam.gserviceaccount.com"
client_id = "您的 client_id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/您的服務帳戶"
universe_domain = "googleapis.com"
